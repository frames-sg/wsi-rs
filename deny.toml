# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
# for the full schema.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
ignore = [
    # RUSTSEC-2021-0153: `encoding` is pulled transitively by dicom-encoding
    # 0.9.1. No safe upstream upgrade exists yet; revisit when dicom-rs
    # replaces it.
    "RUSTSEC-2021-0153",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
    { crate = "getrandom@0.3.4", reason = "transitive build-dependency chain still uses getrandom 0.3 while tempfile dev tooling has moved to 0.4; revisit after upstream convergence" },
    { crate = "r-efi@5.3.0", reason = "paired with transitive getrandom 0.3 in build dependencies; no direct wsi-rs dependency can unify this yet" },
    { crate = "thiserror@1.0.69", reason = "czi-rs still depends on thiserror 1 while wsi-rs and j2k use thiserror 2; revisit on czi-rs upgrade" },
    { crate = "thiserror-impl@1.0.69", reason = "procedural macro pair for the transitive czi-rs thiserror 1 dependency; revisit together with thiserror" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
